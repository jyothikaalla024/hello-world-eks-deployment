apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
  containers:
  - name: hello-world
    image: 986119050506.dkr.ecr.us-east-1.amazonaws.com/helloworldexpress:latest
        ports:
        - containerPort: 3000
